<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institution LMS | Manual Login</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        :root {
            --bb-charcoal: #262626;
            --bb-gold: #b28e0e;
            --bb-bg: #f5f5f5;
            --white: #ffffff;
        }

        body { font-family: Arial, sans-serif; margin: 0; background: var(--bb-bg); height: 100vh; overflow: hidden; }

        /* Blackboard Login Box */
        #authOverlay { 
            position: fixed; inset: 0; background: var(--bb-charcoal); z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; 
        }
        .login-card {
            background: #333; padding: 30px; border-radius: 4px; width: 320px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 5px solid var(--bb-gold);
        }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 2px; border: none; box-sizing: border-box; 
        }
        .btn-login { 
            width: 100%; padding: 12px; background: var(--bb-gold); color: white; 
            border: none; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .g-recaptcha { margin: 15px 0; transform: scale(0.9); transform-origin: 0 0; }

        /* Main App Styles (Existing) */
        #topBanner { height: 50px; background: var(--bb-charcoal); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .wrapper { display: flex; height: calc(100vh - 50px); }
        nav { width: 200px; background: #e1e1e1; border-right: 1px solid #ccc; }
        .nav-item { padding: 15px 20px; border-bottom: 1px solid #d4d4d4; cursor: pointer; color: #444; }
        main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="login-card">
            <h2 style="margin-top:0;">Institution Login</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            
            <div class="g-recaptcha" data-sitekey="6LfGlZ4sAAAAAM1MFntkDwrI-agOqq0NQgEsvO8_"></div>
            
            <button class="btn-login" id="manualLoginBtn">Sign In</button>
            <p id="errorMsg" style="color: #ff7675; font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="appInterface" class="hidden">
        <div id="topBanner">
            <b>Blackboard Learn</b>
            <a id="logoutBtn" style="color:white; cursor:pointer; font-size:13px;">Logout</a>
        </div>
        <div class="wrapper">
            <nav>
                <div class="nav-item">My Institution</div>
                <div class="nav-item">Courses</div>
            </nav>
            <main>
                <h1>Welcome to your Dashboard</h1>
                <p>You have successfully authenticated with Email and reCAPTCHA.</p>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa1Pw2PbRmsAP13VnDJQhRU_-N3-fZxAg",
            authDomain: "fireshare-32e9e.firebaseapp.com",
            projectId: "fireshare-32e9e",
            storageBucket: "fireshare-32e9e.firebasestorage.app",
            messagingSenderId: "188712742694",
            appId: "1:188712742694:web:85c6e61c34d0745f835be7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- AUTH OBSERVER ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('appInterface').classList.remove('hidden');
            } else {
                document.getElementById('authOverlay').classList.remove('hidden');
                document.getElementById('appInterface').classList.add('hidden');
            }
        });

        // --- MANUAL LOGIN LOGIC ---
        document.getElementById('manualLoginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const response = grecaptcha.getResponse();

            // 1. Check reCAPTCHA
            if (response.length === 0) {
                document.getElementById('errorMsg').innerText = "Please complete the reCAPTCHA.";
                return;
            }

            // 2. Firebase Login
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                document.getElementById('errorMsg').innerText = "Login Failed: " + error.message;
            }
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
