<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairShare - Operational</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --success: #10b981;
            --gray-100: #f3f4f6; --gray-500: #6b7280; --gray-800: #1f2937;
        }
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; margin: 0; padding: 0; }
        .app-container { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Header & Balance */
        header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 1.5rem; position: sticky; top: 0; z-index: 10; }
        .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
        .bal-card { background: rgba(255,255,255,0.1); padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); }
        
        /* Tabs */
        .nav-tabs { display: flex; background: white; border-bottom: 1px solid #eee; }
        .nav-tab { flex: 1; padding: 1rem; border: none; background: none; color: var(--gray-500); font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; }
        .nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* Sections */
        .section { display: none; padding: 1rem; padding-bottom: 80px; }
        .section.active { display: block; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; z-index: 1000; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; max-height: 90vh; border-radius: 24px 24px 0 0; padding: 1.5rem; overflow-y: auto; }

        /* Exclusion UI */
        .member-row { display: flex; justify-content: space-between; padding: 12px; background: #f9fafb; border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .member-row.included { border-color: var(--primary); background: #eef2ff; }
        .member-row.excluded { opacity: 0.5; }

        /* Buttons */
        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 24px; box-shadow: 0 8px 16px rgba(99,102,241,0.4); cursor: pointer; z-index: 50; }
        .btn-save { background: var(--primary); color: white; width: 100%; padding: 1.2rem; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; margin-top: 1rem; }
        
        .preview-box { background: var(--gray-800); color: #86efac; padding: 1rem; border-radius: 12px; font-family: monospace; margin-top: 1rem; }
        input, select { width: 100%; padding: 0.8rem; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div style="font-weight: 800; font-size: 1.4rem;">FairShare</div>
        <div class="balance-grid">
            <div class="bal-card">
                <small>YOU OWE</small>
                <div id="totalOwe">$0.00</div>
            </div>
            <div class="bal-card">
                <small>OWED TO YOU</small>
                <div id="totalOwed">$0.00</div>
            </div>
        </div>
    </header>

    <nav class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('expenses')">Expenses</button>
        <button class="nav-tab" onclick="switchTab('debts')">Debts</button>
        <button class="nav-tab" onclick="switchTab('activity')">Activity</button>
    </nav>

    <main class="content">
        <section id="expenses" class="section active">
            <div id="expenseList">Connecting...</div>
        </section>
        <section id="debts" class="section">
            <div id="debtsList">No outstanding debts.</div>
        </section>
        <section id="activity" class="section">
            <div id="activityList">Recent activity will appear here.</div>
        </section>
    </main>

    <button class="fab" id="openBtn"><i class="fas fa-plus"></i></button>
</div>

<div class="modal" id="expenseModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
            <h3>Add Expense</h3>
            <button id="closeBtn" style="border:none; background:none; font-size:1.5rem;">&times;</button>
        </div>
        <input type="text" id="desc" placeholder="What was it for?" style="margin-bottom:10px;">
        <input type="number" id="amount" placeholder="Amount ($)" style="margin-bottom:10px;">
        <label>Paid by:</label>
        <select id="payerSelect" style="margin-bottom:10px;"></select>
        
        <label>Include in split:</label>
        <div id="memberList"></div>

        <div class="preview-box" id="calcPreview">Enter details...</div>
        <button class="btn-save" id="saveBtn">Save & Sync</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCa1Pw2PbRmsAP13VnDJQhRU_-N3-fZxAg",
      authDomain: "fireshare-32e9e.firebaseapp.com",
      projectId: "fireshare-32e9e",
      storageBucket: "fireshare-32e9e.firebasestorage.app",
      messagingSenderId: "188712742694",
      appId: "1:188712742694:web:85c6e61c34d0745f835be7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let members = [
        { id: 1, name: "Lan", avatar: "L" },
        { id: 2, name: "Alice", avatar: "A" },
        { id: 3, name: "Bob", avatar: "B" }
    ];
    let excludedIds = new Set();
    let currentExpenses = [];

    // --- Tab Switching Logic ---
    window.switchTab = (tabId) => {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    };

    // --- Modal Logic ---
    const modal = document.getElementById('expenseModal');
    document.getElementById('openBtn').onclick = () => {
        modal.classList.add('active');
        excludedIds.clear();
        renderMemberToggles();
    };
    document.getElementById('closeBtn').onclick = () => modal.classList.remove('active');

    // --- Exclusion Logic ---
    function renderMemberToggles() {
        const list = document.getElementById('memberList');
        list.innerHTML = members.map(m => `
            <div class="member-row ${excludedIds.has(m.id) ? 'excluded' : 'included'}" data-id="${m.id}">
                <span>${m.name}</span>
                <span>${excludedIds.has(m.id) ? 'Excluded' : 'Included'}</span>
            </div>
        `).join('');

        document.querySelectorAll('.member-row').forEach(row => {
            row.onclick = () => {
                const id = parseInt(row.dataset.id);
                if(excludedIds.has(id)) excludedIds.delete(id);
                else if(excludedIds.size < members.length - 1) excludedIds.add(id);
                renderMemberToggles();
                updatePreview();
            };
        });
    }

    function updatePreview() {
        const total = parseFloat(document.getElementById('amount').value) || 0;
        const activeCount = members.length - excludedIds.size;
        document.getElementById('calcPreview').innerText = `Split: $${(total/activeCount).toFixed(2)} per person`;
    }
    document.getElementById('amount').oninput = updatePreview;
    document.getElementById('payerSelect').innerHTML = members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');

    // --- Firebase Actions ---
    document.getElementById('saveBtn').onclick = async () => {
        const desc = document.getElementById('desc').value;
        const total = parseFloat(document.getElementById('amount').value);
        const payerId = parseInt(document.getElementById('payerSelect').value);
        const activeIds = members.filter(m => !excludedIds.has(m.id)).map(m => m.id);

        if(!desc || !total) return alert("Fill all fields!");

        await addDoc(collection(db, "expenses"), {
            desc, total, payerId, activeIds, 
            share: total / activeIds.length,
            timestamp: new Date()
        });
        modal.classList.remove('active');
    };

    onSnapshot(query(collection(db, "expenses"), orderBy("timestamp", "desc")), (snap) => {
        currentExpenses = snap.docs.map(d => d.data());
        renderList();
        updateBalances();
    });

    function renderList() {
        document.getElementById('expenseList').innerHTML = currentExpenses.map(e => `
            <div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #eee;">
                <div><strong>${e.desc}</strong><br><small>Split: ${e.activeIds.length} people</small></div>
                <div style="text-align:right"><strong>$${e.total.toFixed(2)}</strong></div>
            </div>
        `).join('');
    }

    function updateBalances() {
        let owe = 0, owed = 0;
        currentExpenses.forEach(e => {
            if(e.payerId === 1) owed += e.share * (e.activeIds.length - (e.activeIds.includes(1) ? 1 : 0));
            else if(e.activeIds.includes(1)) owe += e.share;
        });
        document.getElementById('totalOwe').innerText = `$${owe.toFixed(2)}`;
        document.getElementById('totalOwed').innerText = `$${owed.toFixed(2)}`;
    }
</script>
</body>
</html>
