<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: #f5f5f5; }
        
        /* Sidebar Navigation */
        nav { width: 80px; background: #2D3B45; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        nav div { margin-bottom: 25px; cursor: pointer; font-size: 12px; text-align: center; }
        
        /* Main Content Area */
        main { flex-grow: 1; padding: 20px; overflow-y: auto; }
        header { border-bottom: 1px solid #ddd; margin-bottom: 20px; padding-bottom: 10px; }

        /* Course Cards Grid */
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card-banner { height: 120px; background: #0077c2; }
        .card-info { padding: 15px; }
        .card-info h3 { margin: 0; color: #0077c2; font-size: 18px; }
        .card-info p { font-size: 14px; color: #666; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: bold; font-size: 1.5rem;">LMS</div>
        <div>Account</div>
        <div style="color: #ffca28;">Dashboard</div>
        <div>Courses</div>
        <div>Calendar</div>
        <div>Inbox</div>
    </nav>

    <main>
        <header>
            <h1>Dashboard</h1>
        </header>

        <section class="course-grid">
            <div class="card">
                <div class="card-banner" style="background-color: #4a90e2;"></div>
                <div class="card-info">
                    <h3>Advanced Web Dev</h3>
                    <p>CS-302 • Spring 2026</p>
                </div>
            </div>

            <div class="card">
                <div class="card-banner" style="background-color: #50e3c2;"></div>
                <div class="card-info">
                    <h3>Data Structures</h3>
                    <p>CS-201 • Spring 2026</p>
                </div>
            </div>

            <div class="card">
                <div class="card-banner" style="background-color: #f5a623;"></div>
                <div class="card-info">
                    <h3>Cyber Security</h3>
                    <p>CS-405 • Spring 2026</p>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
