<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas LMS | Student Portal</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --canvas-navy: #2D3B45;
            --canvas-red: #E03E2D;
            --bg-gray: #f5f5f5;
            --white: #ffffff;
            --text-dark: #333333;
        }

        body { font-family: 'Lato', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-gray); overflow: hidden; }

        /* --- LOGIN PAGE (Canvas Style) --- */
        #authOverlay { position: fixed; inset: 0; background: #fff; z-index: 2000; display: flex; align-items: center; justify-content: center; background-image: url('https://canvas.instructure.com/images/login/canvas-bg.png'); background-size: cover; }
        .login-card { background: white; padding: 40px; width: 380px; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .login-card img { width: 150px; margin-bottom: 20px; }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 3px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #0081bd; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 3px; }
        .g-recaptcha { margin-bottom: 15px; transform: scale(0.9); transform-origin: 0 0; }

        /* --- GLOBAL SIDEBAR --- */
        nav { width: 84px; background: var(--canvas-navy); color: white; display: flex; flex-direction: column; align-items: center; padding-top: 15px; }
        .nav-item { width: 100%; padding: 10px 0; text-align: center; cursor: pointer; color: #a9a9a9; font-size: 11px; transition: 0.2s; }
        .nav-item i { display: block; font-size: 28px; margin-bottom: 3px; }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(255,255,255,0.1); }
        .nav-item.active { border-left: 4px solid white; }

        /* --- MAIN AREA --- */
        .app-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        header { background: white; padding: 15px 30px; border-bottom: 1px solid #ddd; font-size: 24px; color: var(--text-dark); font-weight: 500; }
        
        .main-content { display: flex; padding: 30px; gap: 30px; }
        .course-section { flex: 3; }
        .sidebar-section { flex: 1; background: white; padding: 20px; border-radius: 5px; height: fit-content; }

        /* --- COURSE CARDS --- */
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card-header { height: 130px; position: relative; }
        .card-body { padding: 15px; }
        .card-body h3 { margin: 0; color: var(--canvas-red); font-size: 18px; }
        .card-footer { border-top: 1px solid #eee; padding: 10px; display: flex; justify-content: space-around; color: #777; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="login-card">
            <h1 style="color:#E03E2D; margin-bottom: 5px;">Canvas</h1>
            <p style="margin-bottom: 25px; color:#666;">Welcome to Edge</p>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            
            <div class="g-recaptcha" data-sitekey="6LfGlZ4sAAAAAM1MFntkDwrI-agOqq0NQgEsvO8_"></div>
            
            <button class="btn-login" id="loginBtn">Log In</button>
            <p id="authError" style="color:red; font-size:12px; margin-top:15px;"></p>
        </div>
    </div>

    <nav id="mainNav" class="hidden">
        <div class="nav-item"><i class="material-icons">account_circle</i>Account</div>
        <div class="nav-item active" onclick="showView('dashboard')"><i class="material-icons">dashboard</i>Dashboard</div>
        <div class="nav-item"><i class="material-icons">class</i>Courses</div>
        <div class="nav-item"><i class="material-icons">calendar_today</i>Calendar</div>
        <div class="nav-item" id="logoutBtn"><i class="material-icons">exit_to_app</i>Logout</div>
    </nav>

    <div class="app-container hidden" id="appContainer">
        <header>Dashboard</header>
        <div class="main-content">
            
            <div class="course-section">
                <div style="font-size:18px; margin-bottom:15px; color:#555;">Published Courses</div>
                <div class="course-grid" id="courseList">
                    </div>
            </div>

            <div class="sidebar-section">
                <div style="font-size:18px; margin-bottom:15px; font-weight:bold;">To Do</div>
                <div style="color:#777; font-size:14px; margin-bottom:10px;">
                    <i class="material-icons" style="font-size:16px; vertical-align:middle;">assignment</i> Submit Research Draft<br>
                    <small>Apr 5 at 11:59pm</small>
                </div>
                <div style="color:#777; font-size:14px;">
                    <i class="material-icons" style="font-size:16px; vertical-align:middle;">quiz</i> M1 Quiz: Algorithms<br>
                    <small>Apr 7 at 11:59pm</small>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa1Pw2PbRmsAP13VnDJQhRU_-N3-fZxAg",
            authDomain: "fireshare-32e9e.firebaseapp.com",
            projectId: "fireshare-32e9e",
            storageBucket: "fireshare-32e9e.firebasestorage.app",
            messagingSenderId: "188712742694",
            appId: "1:188712742694:web:85c6e61c34d0745f835be7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Check Login State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('mainNav').classList.remove('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                loadCourses();
            } else {
                document.getElementById('authOverlay').classList.remove('hidden');
                document.getElementById('mainNav').classList.add('hidden');
                document.getElementById('appContainer').classList.add('hidden');
            }
        });

        // Manual Login
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const captcha = grecaptcha.getResponse();

            if(!captcha) { alert("Please complete the reCAPTCHA"); return; }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                document.getElementById('authError').innerText = "Incorrect email or password.";
            }
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // Fetch Courses
        async function loadCourses() {
            const snap = await getDocs(collection(db, "courses"));
            const list = document.getElementById('courseList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="card">
                        <div class="card-header" style="background:${d.color || '#E03E2D'}"></div>
                        <div class="card-body">
                            <h3>${d.name}</h3>
                            <p style="font-size:13px; color:#666;">${d.code || ''}</p>
                        </div>
                        <div class="card-footer">
                            <i class="material-icons">assignment</i>
                            <i class="material-icons">chat</i>
                            <i class="material-icons">folder</i>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
