<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* Modern Reset and Root Variables */
        :root {
            --sidebar-bg: #2D3B45; /* Canvas style dark grey */
            --sidebar-active: #ffffff; /* Active icon color */
            --icon-color: #A9A9A9; /* Inactive icon color */
            --primary-red: #E03E2D; /* Red accent from Canvas logo */
            --text-color: #333;
            --bg-gray: #f5f5f5;
        }

        body {
            font-family: 'Lato', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-gray);
            overflow: hidden;
        }

        /* --- GLOBAL SIDEBAR --- */
        nav {
            width: 84px; /* Canvas standard width */
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            z-index: 100;
        }

        /* Institutional Logo */
        .logo-placeholder {
            width: 50px;
            height: 50px;
            background-color: white;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: var(--primary-red);
            font-size: 1.2rem;
        }

        /* Navigation Items */
        .nav-item {
            margin-bottom: 22px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--icon-color);
            transition: color 0.2s, background-color 0.2s;
            width: 100%;
            padding: 8px 0;
        }

        .nav-item:hover {
            color: white;
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Active State (e.g., Dashboard) */
        .nav-item.active {
            color: white;
            font-weight: bold;
            background-color: #1a252f; /* Darker grey for active background */
            position: relative;
        }

        /* Active Indicator (subtle white line) */
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background-color: white;
        }

        .nav-item i {
            font-size: 28px;
            margin-bottom: 4px;
        }

        /* Logout at bottom */
        .logout-item {
            margin-top: auto;
            margin-bottom: 20px;
        }

        /* --- MAIN CONTENT AREA --- */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Main Header */
        header {
            background-color: white;
            padding: 15px 30px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 26px;
            color: var(--text-color);
        }

        /* --- DASHBOARD CONTENT --- */
        .dashboard-content {
            padding: 30px;
            display: flex;
            gap: 30px;
        }

        /* --- COURSE CARDS GRID (Left Side) --- */
        .course-section {
            flex: 2; /* Takes up more space */
        }

        .section-header {
            font-size: 20px;
            color: #555;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        /* The Card Styling */
        .card {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        /* Course Color Header */
        .card-color-header {
            height: 130px;
            background-color: var(--primary-red); /* Placeholder red */
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 10px;
        }

        /* Small action icons on header */
        .header-icon {
            color: white;
            opacity: 0.8;
            margin-left: 8px;
        }

        /* Course Information */
        .card-info {
            padding: 20px;
        }

        .card-title {
            margin: 0 0 8px 0;
            font-size: 18px;
            color: var(--primary-red);
            font-weight: 600;
        }

        .card-subtitle {
            margin: 0;
            font-size: 14px;
            color: #777;
        }

        /* Quick Action Icons at Bottom */
        .card-actions {
            border-top: 1px solid #eee;
            padding: 10px 20px;
            display: flex;
            justify-content: space-around;
            color: #777;
        }

        .card-actions i:hover {
            color: var(--primary-red);
        }

        /* --- TO DO / RIGHT SIDEBAR --- */
        .sidebar-section {
            flex: 1; /* Takes up less space */
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .todo-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .todo-icon {
            color: var(--primary-red);
            margin-right: 12px;
        }

        .todo-text {
            flex-grow: 1;
        }

        .todo-title {
            margin: 0 0 4px 0;
            font-size: 15px;
            font-weight: 500;
        }

        .todo-date {
            margin: 0;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-placeholder">LMS</div>
        
        <div class="nav-item">
            <i class="material-icons">account_circle</i>
            <span>Account</span>
        </div>
        
        <div class="nav-item active">
            <i class="material-icons">dashboard</i>
            <span>Dashboard</span>
        </div>
        
        <div class="nav-item">
            <i class="material-icons">class</i>
            <span>Courses</span>
        </div>
        
        <div class="nav-item">
            <i class="material-icons">calendar_today</i>
            <span>Calendar</span>
        </div>
        
        <div class="nav-item">
            <i class="material-icons">mail_outline</i>
            <span>Inbox</span>
        </div>

        <div class="nav-item logout-item">
            <i class="material-icons">exit_to_app</i>
            <span>Logout</span>
        </div>
    </nav>

    <div class="main-container">
