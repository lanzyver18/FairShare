<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairShare - Cloud Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --success: #10b981; --danger: #ef4444;
            --gray-100: #f3f4f6; --gray-500: #6b7280; --gray-800: #1f2937;
        }
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; margin: 0; padding: 0; }
        .app-container { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 1.5rem; position: sticky; top: 0; z-index: 10; }
        .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
        .bal-card { background: rgba(255,255,255,0.1); padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); }
        
        .content { padding: 1rem; padding-bottom: 80px; }
        .expense-item { display: flex; justify-content: space-between; padding: 1.2rem; border-bottom: 1px solid #f0f0f0; transition: 0.2s; }
        .expense-item:hover { background: #f9fafb; }
        
        /* Modal UI */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; z-index: 1000; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; max-height: 90vh; border-radius: 24px 24px 0 0; padding: 1.5rem; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--gray-800); }
        input, select { width: 100%; padding: 0.8rem; border: 2px solid #eee; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        
        /* Exclusion Toggle */
        .member-list { margin-top: 0.5rem; }
        .member-row { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem; background: #f9fafb; border-radius: 12px; margin-bottom: 0.5rem; cursor: pointer; border: 2px solid transparent; }
        .member-row.included { border-color: var(--primary); background: #eef2ff; }
        .member-row.excluded { opacity: 0.5; filter: grayscale(1); }
        .check-icon { color: var(--primary); font-size: 1.2rem; display: none; }
        .included .check-icon { display: block; }

        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 24px; box-shadow: 0 8px 16px rgba(99, 102, 241, 0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 50; }
        .btn-save { background: var(--primary); color: white; width: 100%; padding: 1.2rem; border: none; border-radius: 14px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
        
        .preview-box { background: var(--gray-800); color: #86efac; padding: 1rem; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 0.9rem; margin-bottom: 1rem; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 800; font-size: 1.4rem; letter-spacing: -0.5px;">FairShare</span>
            <i class="fas fa-cloud" style="opacity: 0.8;"></i>
        </div>
        <div class="balance-grid">
            <div class="bal-card">
                <small style="opacity: 0.8; font-size: 0.7rem; font-weight: 700;">YOU OWE</small>
                <div id="totalOwe" style="font-size: 1.4rem; font-weight: 700;">$0.00</div>
            </div>
            <div class="bal-card">
                <small style="opacity: 0.8; font-size: 0.7rem; font-weight: 700;">OWED TO YOU</small>
                <div id="totalOwed" style="font-size: 1.4rem; font-weight: 700;">$0.00</div>
            </div>
        </div>
    </header>

    <div class="content" id="expenseList">
        <div style="text-align: center; color: var(--gray-500); margin-top: 4rem;">
            <i class="fas fa-spinner fa-spin"></i> Connecting to Firebase...
        </div>
    </div>

    <button class="fab" id="openModalBtn">
        <i class="fas fa-plus"></i>
    </button>
</div>

<div class="modal" id="expenseModal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 style="margin:0; font-size: 1.5rem;">New Expense</h2>
            <button id="closeModalBtn" style="border:none; background:#eee; width: 32px; height: 32px; border-radius: 50%; cursor: pointer;">&times;</button>
        </div>

        <div class="form-group">
            <label>What was it for?</label>
            <input type="text" id="desc" placeholder="e.g. Starbucks, Gas, Dinner">
        </div>

        <div class="form-group">
            <label>Amount ($)</label>
            <input type="number" id="amount" step="0.01" placeholder="0.00">
        </div>

        <div class="form-group">
            <label>Who paid?</label>
            <select id="payerSelect"></select>
        </div>

        <div class="form-group">
            <label>Split with:</label>
            <div class="member-list" id="memberList"></div>
        </div>

        <div class="preview-box" id="calcPreview">
            Split info will appear here...
        </div>

        <button class="btn-save" id="saveBtn">Sync to Cloud</button>
    </div>
</div>

<script type="module">
    // 1. IMPORT FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 2. CONFIG (YOURS)
    const firebaseConfig = {
      apiKey: "AIzaSyCa1Pw2PbRmsAP13VnDJQhRU_-N3-fZxAg",
      authDomain: "fireshare-32e9e.firebaseapp.com",
      projectId: "fireshare-32e9e",
      storageBucket: "fireshare-32e9e.firebasestorage.app",
      messagingSenderId: "188712742694",
      appId: "1:188712742694:web:85c6e61c34d0745f835be7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 3. APP STATE
    let members = [
        { id: 1, name: "Lan", avatar: "L" },
        { id: 2, name: "Alice", avatar: "A" },
        { id: 3, name: "Bob", avatar: "B" },
        { id: 4, name: "Charlie", avatar: "C" }
    ];
    let excludedIds = new Set();
    let currentExpenses = [];

    // 4. UI LOGIC
    const modal = document.getElementById('expenseModal');
    const openBtn = document.getElementById('openModalBtn');
    const closeBtn = document.getElementById('closeModalBtn');
    const memberListDiv = document.getElementById('memberList');
    const payerSelect = document.getElementById('payerSelect');
    const amountInput = document.getElementById('amount');
    const calcPreview = document.getElementById('calcPreview');

    openBtn.onclick = () => {
        modal.classList.add('active');
        excludedIds.clear();
        renderMemberToggles();
    };

    closeBtn.onclick = () => modal.classList.remove('active');

    function renderMemberToggles() {
        memberListDiv.innerHTML = members.map(m => `
            <div class="member-row ${excludedIds.has(m.id) ? 'excluded' : 'included'}" data-id="${m.id}">
                <span>${m.name}</span>
                <i class="fas fa-check-circle check-icon"></i>
            </div>
        `).join('');

        // Attach listeners to new rows
        document.querySelectorAll('.member-row').forEach(row => {
            row.onclick = () => {
                const id = parseInt(row.dataset.id);
                if(excludedIds.has(id)) excludedIds.delete(id);
                else {
                    if(excludedIds.size < members.length - 1) excludedIds.add(id);
                }
                renderMemberToggles();
                updateSplitPreview();
            };
        });
    }

    payerSelect.innerHTML = members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');

    function updateSplitPreview() {
        const val = parseFloat(amountInput.value) || 0;
        const count = members.length - excludedIds.size;
        calcPreview.innerText = count > 0 ? `Each pays: $${(val/count).toFixed(2)} (${count} people)` : "Select at least one person";
    }

    amountInput.oninput = updateSplitPreview;

    // 5. FIREBASE WRITE
    document.getElementById('saveBtn').onclick = async () => {
        const desc = document.getElementById('desc').value;
        const total = parseFloat(amountInput.value);
        const payerId = parseInt(payerSelect.value);
        const activeIds = members.filter(m => !excludedIds.has(m.id)).map(m => m.id);

        if(!desc || !total || activeIds.length === 0) return alert("Missing info!");

        try {
            await addDoc(collection(db, "expenses"), {
                desc,
                total,
                payerId,
                activeIds,
                share: total / activeIds.length,
                timestamp: new Date()
            });
            modal.classList.remove('active');
            document.getElementById('desc').value = '';
            amountInput.value = '';
        } catch (e) {
            alert("Error syncing: " + e.message);
        }
    };

    // 6. FIREBASE READ (Real-time)
    const q = query(collection(db, "expenses"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        currentExpenses = snapshot.docs.map(doc => doc.data());
        renderExpenses();
        calculateBalances();
    });

    function renderExpenses() {
        const list = document.getElementById('expenseList');
        if(currentExpenses.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding: 2rem; color: #999;">No expenses yet. Add one!</div>`;
            return;
        }
        list.innerHTML = currentExpenses.map(e => {
            const payer = members.find(m => m.id === e.payerId);
            return `
                <div class="expense-item">
                    <div>
                        <div style="font-weight:700; color: var(--gray-800)">${e.desc}</div>
                        <div style="font-size:0.75rem; color: var(--gray-500)">Paid by ${payer.name} • Split with ${e.activeIds.length}</div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-weight:700; color: var(--primary)">$${e.total.toFixed(2)}</div>
                        <div style="font-size:0.75rem; color: var(--gray-500)">$${e.share.toFixed(2)} / ea</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function calculateBalances() {
        // LAN is ID 1 for balance tracking
        let owe = 0;
        let owed = 0;

        currentExpenses.forEach(e => {
            const isLanPayer = e.payerId === 1;
            const isLanInvolved = e.activeIds.includes(1);

            if(isLanPayer) {
                // If Lan paid, everyone else in the active list owes him their share
                const othersInSplit = e.activeIds.filter(id => id !== 1).length;
                owed += (e.share * othersInSplit);
            } else if (isLanInvolved) {
                // If Lan didn't pay but was included, he owes the payer
                owe += e.share;
            }
        });

        document.getElementById('totalOwe').innerText = `$${owe.toFixed(2)}`;
        document.getElementById('totalOwed').innerText = `$${owed.toFixed(2)}`;
    }
</script>
</body>
</html>
